<!DOCTYPE html>
<html>
<head>
    <title>Honeyfile Security Dashboard</title>
</head>

<body>

<h2>Honeyfile Access Logs</h2>

<table border="1">

<tr>
<th>ID</th>
<th>File</th>
<th>User</th>
</tr>

{% for log in logs %}

<tr>
<td>{{log[0]}}</td>
<td>{{log[1]}}</td>
<td>{{log[2]}}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
